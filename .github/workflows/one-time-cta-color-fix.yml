name: One-time CTA text color fix

on:
  push:
    branches:
      - codex/fix-landing-cta-text-color

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-landing-cta-text-color
          fetch-depth: 0

      - name: Apply the landing CTA color override
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          source = path.read_text()
          rule = (
              '.reeat-site a.site-nav-cta,\n'
              '.reeat-site a.site-cta-primary {\n'
              '    color: var(--re-plate-white);\n'
              '    -webkit-text-fill-color: var(--re-plate-white);\n'
              '}\n'
          )

          if rule in source:
              raise SystemExit('CTA color override already exists')

          pattern = r'(\.site-cta-primary\s*\{[^}]*\}\n)'
          updated, count = re.subn(pattern, r'\1' + rule, source, count=1)
          if count != 1:
              raise SystemExit('Could not locate the primary CTA rule')

          path.write_text(updated)
          PY

      - name: Commit the one-time patch and remove this workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-time-cta-color-fix.yml
          git add index.html
          git commit -m "fix landing CTA text contrast"
          git push origin HEAD:codex/fix-landing-cta-text-color
